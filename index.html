<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con popunder</title>
</head>
<body>
    <h1>Bienvenido</h1>
    <p>Loading site....</p>

    <!-- Script de popunder (se ejecuta al cargar) -->
    <script>
        (function(s){
            s.dataset.zone = '10273232';
            s.src = 'https://al5sm.com/tag.min.js';
        })(
            [document.documentElement, document.body]
                .filter(Boolean)
                .pop()
                .appendChild(document.createElement('script'))
        );
    </script>
</body>
</html>
